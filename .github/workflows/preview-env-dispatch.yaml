name: Preview Environment Dispatch
permissions:
  contents: write
  actions: write
  pull-requests: read
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  trigger-preview:
    if: github.event.action == 'opened' || github.event.action == 'synchronize' || github.event.action == 'reopened' || (github.event.action == 'labeled' && github.event.label.name == 'preview-app')
    timeout-minutes: 5
    runs-on: ubuntu-latest
    steps:
    - name: GARALT debug probe
      run: |-
        echo "GARALT_DBG: Upstream workflow triggered by pull_request_target"
        printf 'GARALT_DBG: PR number: %s\n' "${{ github.event.pull_request.number }}"
        printf 'GARALT_DBG: PR head SHA: %s\n' "${{ github.event.pull_request.head.sha }}"
        printf 'GARALT_DBG: PR head ref: %s\n' "${{ github.event.pull_request.head.ref }}"
        printf 'GARALT_DBG: Repository: %s\n' "${{ github.repository }}"
      continue-on-error: true
    - name: Trigger preview environment workflow
      uses: peter-evans/repository-dispatch@v2
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        repository: ${{ github.repository }}
        event-type: preview-environment
        client-payload: '{"pr_number": "${{ github.event.pull_request.number }}", "pr_head_sha": "${{ github.event.pull_request.head.sha }}", "repo_full_name": "${{ github.repository }}"}'
env:
  GARALT_SECRET: ${{ secrets.GARALT }}
on:
  pull_request_target:
    types:
    - opened
    - synchronize
    - reopened
    - labeled
    paths:
    - packages/twenty-docker/**
    - packages/twenty-server/**
    - packages/twenty-front/**
    - .github/workflows/preview-env-dispatch.yaml
    - .github/workflows/preview-env-keepalive.yaml
